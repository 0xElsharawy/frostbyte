metabase:
  build: .
  container_name: metabase
  restart: no
  env_file:
    - .env
  networks:
    - frostbyte-net
  depends_on:
    postgres:
      condition: service_healthy
  ports:
    - "3000:3000"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 30s
