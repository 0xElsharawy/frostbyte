services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: no
    env_file:
      - .env
    networks:
      - frostbyte-net
    ports:
      - "5432:5432"
    volumes:
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 5s
